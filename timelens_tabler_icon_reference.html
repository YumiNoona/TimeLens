
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{font-family:var(--font-sans);padding:1rem 0}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-primary);font-size:13px}
.section{margin-bottom:20px}
.section-hd{font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase;padding:6px 0 8px;border-bottom:0.5px solid var(--border);margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface-1);cursor:pointer;transition:background .1s}
.item:hover{background:var(--surface-2);border-color:var(--border-strong)}
.item i{font-size:16px;color:var(--text-secondary);flex-shrink:0}
.item-text{min-width:0}
.item-name{font-size:11px;color:var(--text-primary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-class{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.copied{position:fixed;bottom:20px;right:20px;background:var(--surface-2);border:0.5px solid var(--border-strong);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--text-primary);opacity:0;pointer-events:none;transition:opacity .2s}
.copied.show{opacity:1}
.count{font-size:11px;color:var(--text-muted);margin-bottom:12px}
</style>

  <input type="text" id="search" placeholder="Search by app name or class…" oninput="filterIcons()">
</div>
<div class="count" id="count"></div>
<div id="sections"></div>
<div class="copied" id="copied">Copied!</div>
</div>

let allItems = [];

document.getElementById('count').textContent = allItems.length + ' icons — click any to copy the class name';

function renderAll(items) {
  const sections = document.getElementById('sections');
  sections.innerHTML = '';
  const groups = {};
  items.forEach(item => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  });
  Object.entries(groups).forEach(([gname, gitems]) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-hd">${gname}</div><div class="grid" id="grid-${gname.replace(/\W/g,'_')}"></div>`;
    sections.appendChild(sec);
    const grid = sec.querySelector('.grid');
    gitems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `<i class="ti ${item.cls}" aria-hidden="true"></i><div class="item-text"><div class="item-name">${item.name}</div><div class="item-class">${item.cls}</div></div>`;
      el.addEventListener('click', () => {
        navigator.clipboard.writeText(item.cls).catch(()=>{});
        const c = document.getElementById('copied');
        c.textContent = 'Copied: ' + item.cls;
        c.classList.add('show');
        setTimeout(() => c.classList.remove('show'), 1500);
      });
      grid.appendChild(el);
    });
  });
}

function filterIcons() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) { renderAll(allItems); document.getElementById('count').textContent = allItems.length + ' icons — click any to copy the class name'; return; }
  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.key.toLowerCase().includes(q) ||
    i.cls.toLowerCase().includes(q) ||
    i.group.toLowerCase().includes(q)
  );
  renderAll(filtered);
  document.getElementById('count').textContent = filtered.length + ' results';
}
